function genDates(){
  const s=new Date(2026,4,4),r=[];
  for(let i=0;i<84;i++){const d=new Date(s);d.setDate(s.getDate()+i);r.push(String(d.getDate()).padStart(2,"0")+"/"+String(d.getMonth()+1).padStart(2,"0"));}
  return r;
}

function sv(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

let S={
  tab:ld("tab","plan"),day:ld("day",0),rutina:ld("rutina",0),
  exOpen:null,stepOpen:null,
  checked:ld("checked",{}),series:ld("series",{}),
  weights:ld("weights",{}),waists:ld("waists",{}),
  tDate:DATES[0],iW:"",iWt:"",graph:"peso"
};

function el(t,c){const e=document.createElement(t);if(c)e.className=c;return e;}

function render(){
  const app=document.getElementById("app");
  app.innerHTML="";

  const hdr=el("div","hdr");
  hdr.innerHTML='<div class="hdr-sub">Plan semanal</div><div class="hdr-title">Nutrición · Entreno</div><div class="hdr-desc">75kg → 70kg · Mayo 2026</div>';
  app.appendChild(hdr);

  const tabs=el("div","tabs");
  [["plan","Plan"],["rutinas","Rutinas"],["seguimiento","Peso"],["compra","Compra"]].forEach(([id,lbl])=>{
    const b=el("button","tab-btn"+(S.tab===id?" active":""));
    b.dataset.t=id; b.textContent=lbl; tabs.appendChild(b);
  });
  app.appendChild(tabs);

  if(S.tab==="plan") app.appendChild(buildPlan());
  else if(S.tab==="rutinas") app.appendChild(buildRutinas());
  else if(S.tab==="seguimiento") app.appendChild(buildSeg());
  else app.appendChild(buildCompra());

  bindAll();
}

function buildPlan(){
  const w=el("div",""),day=DAYS[S.day];
  const strip=el("div","day-strip");
  DAYS.forEach((d,i)=>{
    const b=el("button","day-btn"+(S.day===i?" active":""));
    b.dataset.di=i; b.style.borderBottomColor=S.day===i?d.color:"transparent";
    b.innerHTML=`<div class="day-lbl">${d.label}</div><div class="day-kcal">${d.kcal.toLocaleString()}</div><div class="day-type" style="color:${d.color}">${d.type}</div>`;
    strip.appendChild(b);
  });
  w.appendChild(strip);
  const p=el("div","sp");
  const mr=el("div","macro-row");
  [["Calorías",day.kcal.toLocaleString(),"#111",false],["Tipo",day.type,day.color,true],["Proteína","~"+day.meals.reduce((s,m)=>s+m.prot,0)+"g","#111",false]].forEach(([l,v,c,sm])=>{
    const b=el("div","macro-box");
    b.innerHTML=`<div class="mlbl">${l}</div><div class="mval${sm?" sm":""}" style="color:${c}">${v}</div>`;
    mr.appendChild(b);
  });
  p.appendChild(mr);
  day.meals.forEach(m=>{
    const tc=TC[m.tipo]||TC["opcional"];
    const r=el("div","meal-row"); r.style.borderLeft=`3px solid ${day.color}`;
    r.innerHTML=`<div class="meal-head"><div><span class="meal-time">${m.time}</span><span class="meal-title">${m.title}</span></div><span class="badge" style="background:${tc.bg};color:${tc.t}">${m.tipo}</span></div><div class="meal-detail">${m.detail}</div><div class="meal-kcal">${m.kcal} kcal · ${m.prot}g prot</div>`;
    p.appendChild(r);
  });
  const tip=el("div","tip-box"); tip.style.marginTop="14px";
  tip.innerHTML=`<div class="tip-lbl">Nota del día</div><div class="tip-txt">${day.tip}</div>`;
  p.appendChild(tip); w.appendChild(p); return w;
}

function buildRutinas(){
  const w=el("div",""),r=RUTINAS[S.rutina];
  const sel=el("div","rutina-sel");
  RUTINAS.forEach((ru,i)=>{
    const b=el("button","rutina-btn"+(S.rutina===i?" active":""));
    b.dataset.ri=i; b.style.borderBottomColor=S.rutina===i?ru.color:"transparent";
    b.innerHTML=`<div class="r-title">Rutina ${ru.id}</div><div class="r-dias">${ru.dias}</div>`;
    sel.appendChild(b);
  });
  w.appendChild(sel);
  const p=el("div","sp");
  const rh=el("div",""); rh.style.marginBottom="14px";
  rh.innerHTML=`<div style="font-size:15px;font-weight:bold;color:#111;margin-bottom:6px">${r.nombre}</div><div style="display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap"><span style="font-size:11px;background:#f3f4f6;padding:3px 10px;border-radius:20px;color:#6b7280">📅 ${r.dias}</span><span style="font-size:11px;background:#f3f4f6;padding:3px 10px;border-radius:20px;color:#6b7280">⏱ ${r.duracion}</span></div><div style="font-size:12px;color:#6b7280;line-height:1.5">${r.descripcion}</div>`;
  p.appendChild(rh);

  const totS=r.ejercicios.reduce((s,e)=>s+e.series,0);
  const doneS=r.ejercicios.reduce((s,e,ei)=>s+Array.from({length:e.series},(_,si)=>S.series[`${S.rutina}-${ei}-${si}`]?1:0).reduce((a,b)=>a+b,0),0);
  const pct=Math.round((doneS/totS)*100);
  if(doneS>0){
    const pb=el("div","prog-box");
    pb.innerHTML=`<div class="prog-top"><span style="color:#6b7280">Progreso sesión</span><span style="font-weight:bold;color:#111">${doneS}/${totS} · ${pct}%</span></div><div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${pct===100?"#059669":r.color}"></div></div>${pct===100?'<div class="prog-done">✓ ¡Rutina completada!</div>':""}`;
    p.appendChild(pb);
  }

  r.ejercicios.forEach((ex,ei)=>{
    const sa=Array.from({length:ex.series},(_,si)=>si);
    const allD=sa.every(si=>S.series[`${S.rutina}-${ei}-${si}`]);
    const isOpen=S.exOpen===ei;
    const card=el("div","ex-card"+(allD?" done-card":""));
    const head=el("div","ex-head"); head.dataset.ei=ei;
    head.innerHTML=`<div class="ex-num" style="background:${allD?"#059669":r.color}">${allD?"✓":ei+1}</div><div style="flex:1"><div class="ex-name">${ex.nombre}</div><div class="ex-meta">${ex.series} series · ${ex.reps} · ${ex.descanso} descanso</div></div><div style="font-size:11px;color:#9ca3af">${isOpen?"▲":"▼"}</div>`;
    card.appendChild(head);
    if(isOpen){
      const body=el("div","ex-body");
      body.innerHTML=`<span class="zona-tag">💪 ${ex.zona}</span><div class="pasos-lbl">Cómo hacerlo paso a paso</div>`;
      ex.pasos.forEach((paso,pi)=>{
        const sk=`${ei}-${pi}`,isS=S.stepOpen===sk;
        const pr=el("div","paso-row"); pr.dataset.sk=sk;
        pr.innerHTML=`<div class="paso-inner${isS?" open":""}"><div class="paso-num" style="background:${r.color}">${pi+1}</div><div class="paso-txt">${paso}</div></div>`;
        body.appendChild(pr);
      });
      const sl=el("div","series-lbl"); sl.textContent="Marcar series completadas"; body.appendChild(sl);
      const sr=el("div","series-row");
      sa.forEach(si=>{
        const done=!!S.series[`${S.rutina}-${ei}-${si}`];
        const sb=el("div","serie-btn"+(done?" done-s":""));
        sb.dataset.ei=ei; sb.dataset.si=si;
        if(done){sb.style.background=r.color;sb.style.borderColor=r.color;}
        sb.innerHTML=`<div class="serie-val" style="${done?"color:#fff":""}">${done?"✓":"S"+(si+1)}</div><div class="serie-sub" style="${done?"color:rgba(255,255,255,.7)":""}">${ex.reps}</div>`;
        sr.appendChild(sb);
      });
      body.appendChild(sr); card.appendChild(body);
    }
    p.appendChild(card);
  });
  const rb=el("button","reset-btn"); rb.id="resetBtn"; rb.textContent="Reiniciar sesión"; p.appendChild(rb);
  w.appendChild(p); return w;
}

function buildSeg(){
  const w=el("div","sp");
  const os=el("div","obj-strip");
  [["Inicio","75,5 kg","4 mayo 2026","#111"],["Objetivo","70 kg","-5,5 kg","#059669"],["Cintura","−5 cm","aprox.","#2563EB"]].forEach(([l,v,s,c])=>{
    const b=el("div","obj-box");
    b.innerHTML=`<div class="mlbl">${l}</div><div style="font-size:18px;font-weight:bold;color:${c}">${v}</div><div style="font-size:11px;color:#9ca3af;margin-top:2px">${s}</div>`;
    os.appendChild(b);
  });
  w.appendChild(os);

  const form=el("div","track-form");
  form.innerHTML=`<div style="font-size:13px;font-weight:bold;color:#111;margin-bottom:10px">Registrar medición</div>
  <div style="margin-bottom:10px"><div class="tlbl">Fecha</div>
  <select id="tDate" style="width:100%;padding:8px 10px;border-radius:8px;border:1px solid #e5e7eb;font-size:13px;font-family:inherit;background:#fff">${DATES.map(d=>`<option value="${d}"${d===S.tDate?" selected":""}>${d}</option>`).join("")}</select></div>
  <div style="margin-bottom:10px"><div class="tlbl">Peso (kg)</div>
  <div class="input-row"><input id="iW" type="number" step="0.1" placeholder="ej. 75.2" value="${S.iW}" class="track-input"/><button id="sW" class="save-btn" style="background:#111">Guardar</button></div>
  ${S.weights[S.tDate]?`<div style="font-size:12px;color:#059669;margin-top:4px">✓ Registrado: ${S.weights[S.tDate]} kg</div>`:""}</div>
  <div><div class="tlbl">Cintura (cm) — medir cada lunes</div>
  <div class="input-row"><input id="iWt" type="number" step="0.5" placeholder="ej. 88.0" value="${S.iWt}" class="track-input"/><button id="sWt" class="save-btn" style="background:#2563EB">Guardar</button></div>
  ${S.waists[S.tDate]?`<div style="font-size:12px;color:#2563EB;margin-top:4px">✓ Registrado: ${S.waists[S.tDate]} cm</div>`:""}</div>`;
  w.appendChild(form);

  const wE=DATES.map(d=>({d,v:S.weights[d]?parseFloat(S.weights[d]):null})).filter(e=>e.v);
  const waE=DATES.map(d=>({d,v:S.waists[d]?parseFloat(S.waists[d]):null})).filter(e=>e.v);
  const gE=S.graph==="peso"?wE:waE;
  const gC=S.graph==="peso"?"#111":"#2563EB";

  if(wE.length>0||waE.length>0){
    const gb=el("div","graph-box");
    const gt=el("div",""); gt.style.cssText="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px";
    gt.innerHTML=`<div style="font-size:13px;font-weight:bold;color:#111">Progreso</div><div class="graph-toggle"><button class="gtog-btn${S.graph==="peso"?" active":""}" data-g="peso">Peso</button><button class="gtog-btn${S.graph==="cintura"?" active":""}" data-g="cintura">Cintura</button></div>`;
    gb.appendChild(gt);
    if(gE.length<2){
      const ng=el("div",""); ng.style.cssText="text-align:center;padding:20px 0;font-size:12px;color:#9ca3af";
      ng.textContent="Añade al menos 2 registros para ver la gráfica"; gb.appendChild(ng);
    } else {
      const gMin=Math.min(...gE.map(e=>e.v))-1,gMax=Math.max(...gE.map(e=>e.v))+1,gR=gMax-gMin||1;
      const sw=el("div",""); sw.style.cssText="position:relative;height:140px;margin-bottom:24px";
      [0,.5,1].forEach(f=>{
        const yl=el("div",""); yl.style.cssText=`position:absolute;left:0;top:${(1-f)*100}%;font-size:10px;color:#9ca3af;transform:translateY(-50%);width:32px;text-align:right`; yl.textContent=(gMin+f*gR).toFixed(1); sw.appendChild(yl);
        const gl=el("div",""); gl.style.cssText=`position:absolute;left:38px;right:0;top:${(1-f)*100}%;height:1px;background:#f3f4f6`; sw.appendChild(gl);
      });
      const ns="http://www.w3.org/2000/svg";
      const svg=document.createElementNS(ns,"svg");
      svg.setAttribute("viewBox","0 0 100 100"); svg.setAttribute("preserveAspectRatio","none");
      svg.style.cssText="position:absolute;left:38px;top:0;right:0;bottom:0;width:calc(100% - 38px);height:100%";
      gE.forEach((e,i)=>{
        if(i===0)return;
        const prev=gE[i-1],x1=(i-1)/(gE.length-1)*100,x2=i/(gE.length-1)*100,y1=100-((prev.v-gMin)/gR)*100,y2=100-((e.v-gMin)/gR)*100;
        const line=document.createElementNS(ns,"line");
        ["x1",x1,"y1",y1,"x2",x2,"y2",y2,"stroke",gC,"stroke-width","2","vector-effect","non-scaling-stroke"].forEach((a,j,ar)=>{if(j%2===0)line.setAttribute(a,ar[j+1]);});
        svg.appendChild(line);
      });
      gE.forEach((e,i)=>{
        const cx=gE.length===1?50:i/(gE.length-1)*100,cy=100-((e.v-gMin)/gR)*100;
        const c=document.createElementNS(ns,"circle");
        c.setAttribute("cx",cx);c.setAttribute("cy",cy);c.setAttribute("r","3");c.setAttribute("fill",gC);c.setAttribute("vector-effect","non-scaling-stroke");
        svg.appendChild(c);
      });
      sw.appendChild(svg);
      const xl=el("div",""); xl.style.cssText="position:absolute;bottom:-18px;left:38px;right:0;display:flex;justify-content:space-between";
      gE.forEach(e=>{const xd=el("div","");xd.style.cssText="font-size:9px;color:#9ca3af;text-align:center";xd.textContent=e.d;xl.appendChild(xd);});
      sw.appendChild(xl); gb.appendChild(sw);
    }
    w.appendChild(gb);
  }

  const histD=DATES.filter(d=>S.weights[d]||S.waists[d]).reverse();
  if(histD.length>0){
    const hb=el("div","card");
    hb.innerHTML='<div style="padding:12px 14px;border-bottom:1px solid #f0f0f0;font-size:13px;font-weight:bold;color:#111">Historial</div>';
    histD.forEach(d=>{
      const r=el("div","hist-row");
      r.innerHTML=`<div class="hist-date">${d}</div>${S.weights[d]?`<span class="hist-tag" style="background:#f3f4f6;color:#374151">⚖️ ${S.weights[d]} kg</span>`:""}${S.waists[d]?`<span class="hist-tag" style="background:#dbeafe;color:#1e40af">📏 ${S.waists[d]} cm</span>`:""}<button class="hist-del" data-dd="${d}">✕</button>`;
      hb.appendChild(r);
    });
    w.appendChild(hb);
  }

  const tip=el("div","tip-box"); tip.style.marginTop="16px";
  tip.innerHTML='<div class="tip-lbl">Consejo</div><div class="tip-txt">Pésate siempre en las mismas condiciones: por la mañana, en ayunas y después de ir al baño. Mide la cintura cada lunes a la misma hora, a la altura del ombligo.</div>';
  w.appendChild(tip); return w;
}

function buildCompra(){
  const w=el("div","sp");
  const tc=Object.values(S.checked).filter(Boolean).length;
  if(tc>0){const db=el("button","deselect-btn");db.id="desAll";db.textContent=`Desmarcar todo (${tc} marcados)`;w.appendChild(db);}
  SHOPPING.forEach(cat=>{
    const cd=el("div",""); cd.style.marginBottom="20px";
    const cl=el("div","shop-cat-lbl"); cl.textContent=cat.cat; cd.appendChild(cl);
    cat.items.forEach((item,idx)=>{
      const key=`${cat.cat}-${idx}`,done=!!S.checked[key];
      const r=el("div","shop-item-row"+(done?" done-item":"")); r.dataset.sk=key;
      r.innerHTML=`<div class="chk-box${done?" done-chk":""}">${done?'<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><polyline points="1.5,5 4,7.5 8.5,2.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>':""}</div><span class="shop-name">${item.n}</span><span class="shop-qty">${item.q}</span>`;
      cd.appendChild(r);
    });
    w.appendChild(cd);
  });
  return w;
}

function bindAll(){
  document.querySelectorAll(".tab-btn").forEach(b=>b.addEventListener("click",()=>{S.tab=b.dataset.t;sv("tab",S.tab);render();}));
  document.querySelectorAll(".day-btn").forEach(b=>b.addEventListener("click",()=>{S.day=parseInt(b.dataset.di);sv("day",S.day);render();}));
  document.querySelectorAll(".rutina-btn").forEach(b=>b.addEventListener("click",()=>{S.rutina=parseInt(b.dataset.ri);S.exOpen=null;S.stepOpen=null;sv("rutina",S.rutina);render();}));
  document.querySelectorAll(".ex-head").forEach(h=>h.addEventListener("click",()=>{const ei=parseInt(h.dataset.ei);S.exOpen=S.exOpen===ei?null:ei;S.stepOpen=null;render();}));
  document.querySelectorAll(".paso-row").forEach(p=>p.addEventListener("click",e=>{e.stopPropagation();const sk=p.dataset.sk;S.stepOpen=S.stepOpen===sk?null:sk;render();}));
  document.querySelectorAll(".serie-btn").forEach(sb=>sb.addEventListener("click",e=>{e.stopPropagation();const k=`${S.rutina}-${sb.dataset.ei}-${sb.dataset.si}`;S.series[k]=!S.series[k];sv("series",S.series);render();}));
  const rb=document.getElementById("resetBtn");
  if(rb)rb.addEventListener("click",()=>{RUTINAS[S.rutina].ejercicios.forEach((_,ei)=>Array.from({length:_.series},(__,si)=>{delete S.series[`${S.rutina}-${ei}-${si}`];}););sv("series",S.series);render();});
  const td=document.getElementById("tDate");
  if(td)td.addEventListener("change",()=>{S.tDate=td.value;render();});
  const iw=document.getElementById("iW");
  if(iw)iw.addEventListener("input",()=>S.iW=iw.value);
  const sw=document.getElementById("sW");
  if(sw)sw.addEventListener("click",()=>{if(S.iW){S.weights[S.tDate]=S.iW;sv("weights",S.weights);S.iW="";render();}});
  const iwt=document.getElementById("iWt");
  if(iwt)iwt.addEventListener("input",()=>S.iWt=iwt.value);
  const swt=document.getElementById("sWt");
  if(swt)swt.addEventListener("click",()=>{if(S.iWt){S.waists[S.tDate]=S.iWt;sv("waists",S.waists);S.iWt="";render();}});
  document.querySelectorAll(".gtog-btn").forEach(b=>b.addEventListener("click",()=>{S.graph=b.dataset.g;render();}));
  document.querySelectorAll("[data-dd]").forEach(b=>b.addEventListener("click",()=>{const d=b.dataset.dd;delete S.weights[d];delete S.waists[d];sv("weights",S.weights);sv("waists",S.waists);render();}));
  document.querySelectorAll(".shop-item-row").forEach(r=>r.addEventListener("click",()=>{const k=r.dataset.sk;S.checked[k]=!S.checked[k];sv("checked",S.checked);render();}));
  const da=document.getElementById("desAll");
  if(da)da.addEventListener("click",()=>{S.checked={};sv("checked",S.checked);render();});
}

render();
</script>
</body>
</html>
